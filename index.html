<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Winkelumrechner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d12;
      --surface: #16161f;
      --border:  #2a2a3a;
      --accent:  #7b6ef6;
      --accent2: #c084fc;
      --text:    #e8e6f0;
      --muted:   #6b6880;
      --mono:    'Space Mono', monospace;
      --sans:    'Space Grotesk', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .glow {
      position: fixed;
      width: 520px; height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(123,110,246,.18) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2.8rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 0 0 1px rgba(123,110,246,.08), 0 24px 60px rgba(0,0,0,.5);
    }

    /* ── Header ── */
    .header { margin-bottom: 1.8rem; }
    .eyebrow {
      font-family: var(--mono);
      font-size: .65rem;
      letter-spacing: .18em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: .55rem;
    }
    h1 {
      font-size: 1.55rem;
      font-weight: 600;
      line-height: 1.25;
      color: var(--text);
    }
    h1 .h1-to { color: var(--muted); font-weight: 300; }
    h1 .h1-target { color: var(--accent2); transition: color .3s; }

    /* ── Mode toggle ── */
    .mode-toggle {
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 1.8rem;
      gap: 4px;
    }
    .mode-btn {
      flex: 1;
      background: transparent;
      border: none;
      border-radius: 9px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: .72rem;
      padding: .5rem .6rem;
      cursor: pointer;
      transition: background .2s, color .2s;
      white-space: nowrap;
      text-align: center;
    }
    .mode-btn.active {
      background: var(--accent);
      color: #fff;
    }

    /* ── Label + input ── */
    label {
      display: block;
      font-size: .78rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: .05em;
      text-transform: uppercase;
      margin-bottom: .5rem;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 0;
    }
    .input-wrap input {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 1.5rem;
      font-weight: 700;
      padding: .9rem 4rem .9rem 1.2rem;
      outline: none;
      transition: border-color .2s;
      -moz-appearance: textfield;
    }
    .input-wrap input::-webkit-outer-spin-button,
    .input-wrap input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .input-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(123,110,246,.15);
    }
    .unit-badge {
      position: absolute;
      right: 1rem; top: 50%;
      transform: translateY(-50%);
      font-family: var(--mono);
      font-size: .75rem;
      color: var(--muted);
      background: var(--border);
      padding: .2rem .5rem;
      border-radius: 6px;
      pointer-events: none;
    }

    /* ── Swap divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin: 1rem 0;
      color: var(--muted);
      font-size: .75rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .swap-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: rgba(123,110,246,.12);
      border: 1px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: background .2s, transform .3s;
    }
    .swap-btn:hover { background: rgba(123,110,246,.25); }
    .swap-btn.spinning { transform: rotate(180deg); }
    .swap-btn svg { width: 15px; height: 15px; stroke: var(--accent); }

    /* ── Result ── */
    .result-block {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      min-height: 70px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: .3rem;
      transition: border-color .25s;
    }
    .result-block.has-value { border-color: rgba(123,110,246,.4); }

    .result-decimal {
      font-family: var(--mono);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.01em;
      word-break: break-all;
    }
    .result-decimal .unit { color: var(--accent2); font-size: 1rem; margin-left: .3rem; }
    .result-sub {
      font-family: var(--mono);
      font-size: .78rem;
      color: var(--muted);
    }
    .result-sub .pi-accent { color: var(--accent); }

    /* ── Quick values ── */
    .quick-label {
      font-size: .72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin: 1.6rem 0 .6rem;
    }
    .quick-btns {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
    }
    .quick-btns button {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: .72rem;
      padding: .35rem .7rem;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
    }
    .quick-btns button:hover {
      background: rgba(123,110,246,.1);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Footer ── */
    .footer {
      margin-top: 1.8rem;
      font-size: .68rem;
      color: var(--muted);
      text-align: center;
      font-family: var(--mono);
      line-height: 1.7;
    }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; }
      h1 { font-size: 1.3rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>

<div class="glow"></div>

<div class="card">
  <div class="header">
    <p class="eyebrow">Winkelumrechner</p>
    <h1 id="h1-title">Grad <span class="h1-to">→</span> <span class="h1-target">Bogenmaß</span></h1>
  </div>

  <!-- Mode toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-deg2rad" onclick="setMode('deg2rad')">° Grad → rad Bogenmaß</button>
    <button class="mode-btn" id="btn-rad2deg" onclick="setMode('rad2deg')">rad Bogenmaß → ° Grad</button>
  </div>

  <!-- Input -->
  <label id="input-label">Winkel in Grad (°)</label>
  <div class="input-wrap">
    <input
      id="main-input"
      type="number"
      placeholder="0"
      step="any"
      inputmode="decimal"
      autofocus
    />
    <span class="unit-badge" id="input-unit">°</span>
  </div>

  <!-- Divider / swap -->
  <div class="divider">
    <button class="swap-btn" id="swap-btn" onclick="swap()" title="Richtung tauschen" aria-label="Umrechnung umkehren">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="17 1 21 5 17 9"/>
        <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
        <polyline points="7 23 3 19 7 15"/>
        <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
      </svg>
    </button>
    umrechnen
  </div>

  <!-- Result -->
  <label id="result-label">Bogenmaß (rad)</label>
  <div class="result-block" id="result-block">
    <span class="result-decimal" id="result-decimal" style="color:var(--muted)">—</span>
    <span class="result-sub" id="result-sub"></span>
  </div>

  <!-- Quick values -->
  <p class="quick-label" id="quick-label">Häufige Winkel</p>
  <div class="quick-btns" id="quick-btns"></div>

  <p class="footer" id="footer-formula">
    Formel: rad = deg × π / 180 &nbsp;·&nbsp; π ≈ 3.14159265358979…
  </p>
</div>

<script>
  // ── State ──
  let mode = 'deg2rad'; // or 'rad2deg'

  const QUICK_DEG = [
    { label: '0°',   val: 0 },
    { label: '30°',  val: 30 },
    { label: '45°',  val: 45 },
    { label: '60°',  val: 60 },
    { label: '90°',  val: 90 },
    { label: '120°', val: 120 },
    { label: '180°', val: 180 },
    { label: '270°', val: 270 },
    { label: '360°', val: 360 },
  ];

  const QUICK_RAD = [
    { label: '0',       val: 0 },
    { label: 'π/6',     val: Math.PI / 6 },
    { label: 'π/4',     val: Math.PI / 4 },
    { label: 'π/3',     val: Math.PI / 3 },
    { label: 'π/2',     val: Math.PI / 2 },
    { label: 'π',       val: Math.PI },
    { label: '3π/2',    val: 3 * Math.PI / 2 },
    { label: '2π',      val: 2 * Math.PI },
  ];

  // ── Helpers ──
  function gcd(a, b) {
    a = Math.abs(a); b = Math.abs(b);
    while (b) { [a, b] = [b, a % b]; }
    return a;
  }

  function piRepr(degrees) {
    const MAX = 10000;
    const raw = degrees / 180;
    if (raw === 0) return '0';
    const rounded = Math.round(raw * MAX) / MAX;
    let num = Math.round(rounded * MAX), den = MAX;
    const g = gcd(Math.abs(num), den);
    num /= g; den /= g;
    if (Math.abs(num / den - raw) > 1e-9) return null;
    const sign = num < 0 ? '−' : '';
    num = Math.abs(num);
    if (den === 1) return `${sign}${num === 1 ? '' : num}π`;
    return `${sign}${num === 1 ? '' : num}π / ${den}`;
  }

  // ── Convert & render ──
  function convert() {
    const raw = document.getElementById('main-input').value;
    const decEl  = document.getElementById('result-decimal');
    const subEl  = document.getElementById('result-sub');
    const block  = document.getElementById('result-block');

    if (raw === '' || raw === null || isNaN(parseFloat(raw))) {
      decEl.innerHTML = '<span style="color:var(--muted)">—</span>';
      subEl.innerHTML = '';
      block.classList.remove('has-value');
      return;
    }

    const val = parseFloat(raw);

    if (mode === 'deg2rad') {
      const rad = val * Math.PI / 180;
      const display = parseFloat(rad.toPrecision(10));
      decEl.innerHTML = `${display}<span class="unit">rad</span>`;
      const pi = piRepr(val);
      subEl.innerHTML = pi ? `≈ <span class="pi-accent">${pi}</span>` : '';
    } else {
      const deg = val * 180 / Math.PI;
      const display = parseFloat(deg.toPrecision(10));
      decEl.innerHTML = `${display}<span class="unit">°</span>`;
      // Show how many full rotations
      const full = Math.floor(Math.abs(deg) / 360);
      subEl.innerHTML = full > 0
        ? `<span class="pi-accent">${full}</span> volle Umdrehung${full > 1 ? 'en' : ''}`
        : '';
    }

    block.classList.add('has-value');
  }

  // ── Mode switching ──
  function setMode(m) {
    mode = m;
    document.getElementById('main-input').value = '';
    document.getElementById('result-decimal').innerHTML = '<span style="color:var(--muted)">—</span>';
    document.getElementById('result-sub').innerHTML = '';
    document.getElementById('result-block').classList.remove('has-value');

    const isDeg = (m === 'deg2rad');
    document.getElementById('btn-deg2rad').classList.toggle('active', isDeg);
    document.getElementById('btn-rad2deg').classList.toggle('active', !isDeg);
    document.getElementById('input-label').textContent  = isDeg ? 'Winkel in Grad (°)' : 'Winkel in Bogenmaß (rad)';
    document.getElementById('result-label').textContent = isDeg ? 'Bogenmaß (rad)' : 'Grad (°)';
    document.getElementById('input-unit').textContent   = isDeg ? '°' : 'rad';
    document.getElementById('h1-title').innerHTML       = isDeg
      ? 'Grad <span class="h1-to">→</span> <span class="h1-target">Bogenmaß</span>'
      : 'Bogenmaß <span class="h1-to">→</span> <span class="h1-target">Grad</span>';
    document.getElementById('footer-formula').innerHTML = isDeg
      ? 'Formel: rad = deg × π / 180 &nbsp;·&nbsp; π ≈ 3.14159265358979…'
      : 'Formel: deg = rad × 180 / π &nbsp;·&nbsp; π ≈ 3.14159265358979…';
    document.getElementById('quick-label').textContent  = isDeg ? 'Häufige Winkel' : 'Häufige Bogenmaße';

    renderQuickBtns();
    document.getElementById('main-input').focus();
  }

  function swap() {
    const btn = document.getElementById('swap-btn');
    btn.classList.add('spinning');
    setTimeout(() => btn.classList.remove('spinning'), 320);
    setMode(mode === 'deg2rad' ? 'rad2deg' : 'deg2rad');
  }

  // ── Quick buttons ──
  function renderQuickBtns() {
    const container = document.getElementById('quick-btns');
    const items = mode === 'deg2rad' ? QUICK_DEG : QUICK_RAD;
    container.innerHTML = items.map(({ label, val }) =>
      `<button data-val="${val}">${label}</button>`
    ).join('');
  }

  document.getElementById('quick-btns').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-val]');
    if (!btn) return;
    const v = parseFloat(btn.dataset.val);
    // Round to avoid ugly floats in input (e.g. π/6)
    document.getElementById('main-input').value = parseFloat(v.toPrecision(10));
    convert();
    document.getElementById('main-input').focus();
  });

  document.getElementById('main-input').addEventListener('input', convert);

  // ── Init ──
  renderQuickBtns();
</script>
</body>
</html>
